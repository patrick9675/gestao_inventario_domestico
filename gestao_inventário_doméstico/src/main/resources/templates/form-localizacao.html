<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Nova Localização</title>
</head>
<body>

<h1>Nova Localização</h1>

<form th:action="@{/localizacoes}"
      th:object="${localizacao}"
      method="post">

    <label>Nome:</label>

    <input type="text"
           th:field="*{nome}">

    <br><br>

    <button type="submit">
        Guardar
    </button>

</form>

<br>

<a th:href="@{/localizacoes}">
    Voltar
</a>

</body>
</html>
