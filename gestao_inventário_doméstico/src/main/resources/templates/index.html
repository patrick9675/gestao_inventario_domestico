<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>HomeStock</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<h1>HomeStock - Inventário Doméstico</h1>

<!-- PRODUTOS -->

<div class="section">

    <h2>Produtos</h2>

    <!-- FORMULÁRIO PRODUTO -->

    <form th:action="@{/produtos}"
          th:object="${produto}"
          method="post">

        <input type="text"
               th:field="*{nome}"
               placeholder="Nome do produto"
               required>

        <input type="number"
               th:field="*{quantidade}"
               placeholder="Quantidade"
               required>

        <input type="date"
               th:field="*{dataValidade}">

        <!-- CATEGORIA -->

        <select th:field="*{categoria}" required>

            <option value="">
                Selecionar Categoria
            </option>

            <option th:each="categoria : ${categorias}"
                    th:value="${categoria.id}"
                    th:text="${categoria.nome}">
            </option>

        </select>

        <!-- LOCALIZAÇÃO -->

        <select th:field="*{localizacao}" required>

            <option value="">
                Selecionar Localização
            </option>

            <option th:each="localizacao : ${localizacoes}"
                    th:value="${localizacao.id}"
                    th:text="${localizacao.nome}">
            </option>

        </select>

        <button type="submit">
            Adicionar Produto
        </button>

    </form>

    <br>

    <!-- FILTROS -->

    <form method="get" th:action="@{/}">

        <select name="filtro">

            <option value="">
                Selecionar Filtro
            </option>

            <!-- CATEGORIAS -->

            <option th:each="categoria : ${categorias}"
                    th:value="|categoria-${categoria.id}|"
                    th:text="|Categoria: ${categoria.nome}|">
            </option>

            <!-- LOCALIZAÇÕES -->

            <option th:each="localizacao : ${localizacoes}"
                    th:value="|localizacao-${localizacao.id}|"
                    th:text="|Localização: ${localizacao.nome}|">
            </option>

            <!-- ALERTAS -->

            <option value="alerta-3">
                Expira em 3 dias
            </option>

            <option value="alerta-7">
                Expira em 7 dias
            </option>

            <option value="alerta-expirado">
                Produtos Expirados
            </option>

        </select>

        <button type="submit">
            Filtrar
        </button>

        <a th:href="@{/}">
            Limpar
        </a>

    </form>

    <br>

    <!-- TABELA PRODUTOS -->

    <table>

        <tr>
            <th>Nome</th>
            <th>Quantidade</th>
            <th>Validade</th>
            <th>Categoria</th>
            <th>Localização</th>
            <th>Alerta</th>
            <th>Ações</th>
        </tr>

        <tr th:each="produto : ${produtos}"

            th:style="${produto.expirado()} ?
            'background-color: #ffb3b3;' :

            (${produto.alerta3Dias()} ?
            'background-color: #ff9999;' :

            (${produto.alerta7Dias()} ?
            'background-color: #fff3cd;' : ''))">

            <td th:text="${produto.nome}"></td>

            <td th:text="${produto.quantidade}"></td>

            <td th:text="${produto.dataValidade}"></td>

            <td th:text="${produto.categoria.nome}"></td>

            <td th:text="${produto.localizacao.nome}"></td>

            <!-- ALERTAS -->

            <td>

                <span th:if="${produto.expirado()}">
                    Produto expirado
                </span>

                <span th:if="${produto.alerta3Dias()}">
                    Expira em menos de 3 dias
                </span>

                <span th:if="${produto.alerta7Dias()}">
                    Expira em menos de 7 dias
                </span>

            </td>

            <!-- AÇÕES -->

            <td>

                <a th:href="@{/produtos/apagar/{id}(id=${produto.id})}">
                    Apagar
                </a>

            </td>

        </tr>

    </table>

</div>

<!-- CATEGORIAS -->

<div class="section">

    <h2>Categorias</h2>

    <form th:action="@{/categorias}"
          method="post">

        <input type="text"
               name="nome"
               placeholder="Nova categoria"
               required>

        <button type="submit">
            Adicionar Categoria
        </button>

    </form>

    <br>

    <ul>

        <li th:each="categoria : ${categorias}">

            <span th:text="${categoria.nome}"></span>

            -

            <a th:href="@{/categorias/apagar/{id}(id=${categoria.id})}">
                Apagar
            </a>

        </li>

    </ul>

</div>

<!-- LOCALIZAÇÕES -->

<div class="section">

    <h2>Localizações</h2>

    <form th:action="@{/localizacoes}"
          method="post">

        <input type="text"
               name="nome"
               placeholder="Nova localização"
               required>

        <button type="submit">
            Adicionar Localização
        </button>

    </form>

    <br>

    <ul>

        <li th:each="localizacao : ${localizacoes}">

            <span th:text="${localizacao.nome}"></span>

            -

            <a th:href="@{/localizacoes/apagar/{id}(id=${localizacao.id})}">
                Apagar
            </a>

        </li>

    </ul>

</div>

</body>
</html>
